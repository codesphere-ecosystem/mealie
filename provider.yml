name: maelie-solution
schemaVersion: v0
author: Partner Days
displayName: Maelie (Solution)
iconUrl: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/webp/mealie.webp
category: Lifestyle
description: |
  Mealie is an intuitive and easy to use recipe management app. It's designed to make your life easier by being the best recipes management experience on the web and providing you with an easy to use interface to manage your growing collection of recipes.

backend:
  landscape:
    gitUrl: https://github.com/codesphere-ecosystem/mealie

configSchema:
  type: object
  properties:
    VERSION:
      type: string
      description: Mealie version
      enum: ['v3.14.0', 'v3.13.0', 'v3.12.0', 'v3.11.0', 'v3.10.0']
      default: v3.14.0
  required: ['VERSION']

secretsSchema:
  type: object
  properties:
    pgSuperuserPassword:
      type: string
      format: password
    pgUserPassword:
      type: string
      format: password

detailsSchema:
  type: object
  properties:
    hostname:
      type: string

plans:
 - id: 0
   name: Default Plan
   description: Resource usage depends on the ci-profile of the landscape.
   parameters: {}


versions:
  0.0.1:
    ciProfile: postgres
    # gitRef can be a commit-hash, branch or tag
    gitRef: utku/provider
    description: Example solution (mutable version pointing to main branch)