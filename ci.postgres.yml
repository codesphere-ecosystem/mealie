schemaVersion: v0.2
prepare:
  steps:
    - name: Clone mealie repo
      command: git clone https://github.com/mealie-recipes/mealie
    - name: Create mealie-data directory
      command: mkdir -p .mealie-data
test:
  steps: []
run:
  mealie:
    healthEndpoint: http://localhost:9000/
    plan: 101
    replicas: 1
    network:
      ports:
        - port: 9000
          isPublic: false
      paths:
        - port: 9000
          path: /
    env:
      ALLOW_SIGNUP: "false"
      TZ: Europe/Berlin
      BASE_URL: ${{ workspace.id }}-3000.1.csa.codesphere-demo.com
      DB_ENGINE: postgres
      POSTGRES_USER: mealie
      POSTGRES_PASSWORD: ${{ vault.pgPassword }}
      POSTGRES_SERVER: ms-postgres-v1-10-landscape-22-pg-mealie.ms-postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: mealie
    runAsUser: 1501
    runAsGroup: 1010
    volumeMounts:
      - name: _workspace
        mountPath: /app/data/
        workspacePath: ./.mealie-data/
    steps:
      - command: /app/run.sh
    image: ghcr.io/mealie-recipes/mealie:v3.14.0
  pg-mealie:
    provider:
      name: postgres
      version: v1
    plan:
      id: 0
      parameters:
        cpu: 5
        memory: 500
    config:
      version: "17.6"
      userName: mealie
      databaseName: mealie
    secrets:
      userPassword: ${{ vault.pgPassword }}
      superuserPassword: ${{ vault.pgPassword }}
