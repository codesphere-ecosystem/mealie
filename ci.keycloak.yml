# ci.keycloak.yml — CI profile for Keycloak running in a Virtual Kubernetes Cluster.
#
# On-site challenge starter (Module 6). See Course A, Module 6, article 6.6
# ("On-Site Challenge — Keycloak in vCluster & Your provider.yml") in the Learning
# Hub for the full task, and article 3.10 (Virtual Kubernetes Clusters) for when to
# use a vCluster at all.
#
# Deploy this profile from its own Workspace (e.g. name it "keycloak"), separate
# from the "mealie" profile's Workspace. Both run at the same time in the same
# Team so Mealie can reach Keycloak over the internal platform network for OIDC.
#
# Before writing this file: provision a vCluster Managed Service in your Team
# (Managed Services → Service Catalog → Virtual Kubernetes Cluster). Each Team
# gets exactly one — check whether your Team already has one before creating a
# second.
schemaVersion: v0.2

prepare:
  steps: []

test:
  steps: []

run:
